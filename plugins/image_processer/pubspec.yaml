name: pawssistant_plugin_image_processer
description: "Pawssistant图像处理器 - 提供裁剪旋转、格式转换、扩图、背景填充、水印等多种图像处理功能"
version: 0.0.1
homepage:

environment:
  sdk: ^3.12.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  image: ^4.5.3
  path: ^1.9.0
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      macos:
        pluginClass: PawssistantPluginImageProcesserPlugin
      windows:
        pluginClass: PawssistantPluginImageProcesserPluginCApi
